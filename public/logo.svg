<svg viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Logo Mark -->
  <g transform="translate(0, 10)">
    <!-- Pipeline/Flow Shape - Abstract flowing arrow -->
    <defs>
      <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#0f1d4a;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
      </linearGradient>
    </defs>

    <!-- Main flowing shape -->
    <path d="M 8 15 Q 12 8 20 8 L 28 8 Q 32 8 34 12 L 36 16 Q 37 18 36 20 L 34 24 Q 32 28 28 28 L 20 28 Q 12 28 8 20 Z" fill="url(#flowGradient)" />

    <!-- Arrow point (right side) -->
    <path d="M 28 8 L 36 16 L 28 24" fill="url(#flowGradient)" />

    <!-- Secondary flowing element -->
    <circle cx="10" cy="16" r="2" fill="#2563eb" opacity="0.8" />
    <circle cx="18" cy="12" r="1.5" fill="#2563eb" opacity="0.6" />
  </g>

  <!-- Wordmark -->
  <g transform="translate(50, 18)">
    <text x="0" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#0f1d4a" letter-spacing="-0.3">
      LetRevenueFlow
    </text>
  </g>
</svg>